<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UI Preview — Taxpayer Q&amp;A</title>
  <link rel="stylesheet" href="ui-preview.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark"></span>
      <h1>Taxpayer Q&amp;A</h1>
    </div>
    <p class="subtitle">Ollama &middot; gemma3:12b</p>
  </header>

  <form class="layout" action="#" onsubmit="return false;">
    <section class="col col-left">
      <div class="card">
        <div class="field">
          <label for="taxpayerId">Taxpayer</label>
          <select id="taxpayerId" name="taxpayerId">
            <option>Maria Chen</option>
            <option selected>David Okafor</option>
            <option>Ben</option>
          </select>
        </div>
      </div>

      <div class="card chat-card">
        <div class="field">
          <label for="freeformQuestion">Free-form question(s)</label>
          <textarea
            id="freeformQuestion"
            rows="6"
            placeholder="Type one question per line...&#10;e.g. Did the taxpayer claim any dependents?"
          ></textarea>
        </div>
        <div class="actions">
          <button type="submit">Ask AI</button>
        </div>
      </div>

      <div class="card result-card">
        <h2>Answers</h2>
        <table>
          <thead>
            <tr><th>Question</th><th>Answer</th></tr>
          </thead>
          <tbody>
            <tr>
              <td>Is the taxpayer filing as married filing jointly?</td>
              <td><span class="badge badge-yes">Yes</span></td>
            </tr>
            <tr>
              <td>What is the taxpayer's total reported income?</td>
              <td>$84,250</td>
            </tr>
            <tr>
              <td>Did the taxpayer claim any dependents?</td>
              <td><span class="badge badge-no">No</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <aside class="col col-right">
      <div class="card questions-card">
        <label>Questions</label>
        <div class="checkbox-list">
          <label class="checkbox-item">
            <input type="checkbox" checked />
            <span class="checkbox-text">Is the taxpayer filing as married filing jointly?</span>
            <span class="type-tag">boolean</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" checked />
            <span class="checkbox-text">What is the taxpayer's total reported income?</span>
            <span class="type-tag">number</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" checked />
            <span class="checkbox-text">Did the taxpayer claim any dependents?</span>
            <span class="type-tag">boolean</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" />
            <span class="checkbox-text">What filing status did the taxpayer select?</span>
            <span class="type-tag">text</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" />
            <span class="checkbox-text">Did the taxpayer report any self-employment income?</span>
            <span class="type-tag">boolean</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" />
            <span class="checkbox-text">What is the taxpayer's state of residence?</span>
            <span class="type-tag">text</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" />
            <span class="checkbox-text">Did the taxpayer itemize deductions?</span>
            <span class="type-tag">boolean</span>
          </label>
        </div>
      </div>
    </aside>
  </form>
</body>
</html>
